version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: school_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-school_db}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: school_app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-school_db}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-http://localhost:3000}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - uploads:/app/public/uploads

    # Traefik labels for Dokploy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.school.rule=Host(`${DOMAIN:-localhost}`)"
      - "traefik.http.routers.school.entrypoints=websecure"
      - "traefik.http.routers.school.tls.certresolver=letsencrypt"
      - "traefik.http.services.school.loadbalancer.server.port=3000"

volumes:
  postgres_data:
  uploads:
